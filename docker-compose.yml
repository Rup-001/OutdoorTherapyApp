version: '3.8'

services:
  # Redis Service
  redis:
    image: redis:alpine
    restart: always
    networks:
      - outdoor_network
    # Cache-er jonno persistence lagle niche-r line ta uncomment koro
    # volumes:
    #   - redis_data:/data

  # Backend API Service
  api:
    build: .
    container_name: music-backend
    restart: always
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - NODE_ENV=production
      - REDIS_HOST=redis
      - REDIS_PORT=6379
    depends_on:
      - redis
    networks:
      - outdoor_network

networks:
  outdoor_network:
    driver: bridge

