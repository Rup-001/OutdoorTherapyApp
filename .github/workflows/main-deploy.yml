name: Deploy to Production (AWS EC2)

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Deploy to EC2 via SSH
        uses: appleboy/ssh-action@v0.1.10
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          port: 22
          script: |
            # 1. Project backend folder-e jao
            mkdir -p ~/outdoor-therapy/backend
            cd ~/outdoor-therapy/backend || exit

            # 2. Configure git for SSH automation
            export GIT_SSH_COMMAND="ssh -o StrictHostKeyChecking=no"

            # 3. Git initialization if not exists
            if [ ! -d ".git" ]; then
              git init
              git remote add origin git@github.com:Rup-001/OutdoorTherapyApp.git
            fi

            # 4. Update remote to SSH to ensure it works
            git remote set-url origin git@github.com:Rup-001/OutdoorTherapyApp.git

            # 5. Fetch and reset code
            git fetch origin main
            git reset --hard origin/main

            # 6. Enter Bankend folder where docker-compose lives
            cd Bankend || exit

            # 7. Docker containers rebuild
            # Ensure .env is present in this Bankend folder
            docker compose down
            docker compose up -d --build

            # 8. Clean up
            docker image prune -f