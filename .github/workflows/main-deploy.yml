name: Deploy to Production (AWS EC2)

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Deploy to EC2 via SSH
        uses: appleboy/ssh-action@v0.1.10
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          port: 22
          script: |
            # Project main folder-e jao
            mkdir -p ~/outdoor-therapy/backend
            # cd ~/outdoor-therapy/backend || exit

            # Git initialization if not exists
            if [ ! -d ".git" ]; then
              git init
              git remote add origin https://github.com/${{ github.repository }}.git
            fi

            # Fetch and reset code (Safe for non-empty folders)
            git fetch origin main
            git reset --hard origin/main

            # Enter backend folder where docker-compose lives
            cd backend || exit

            # Docker containers rebuild ebong restart
            # Ensure .env is present in this backend folder
            docker compose down
            docker compose up -d --build

            # Clean up unused images
            docker image prune -f