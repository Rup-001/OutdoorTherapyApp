components:
  schemas:
    User:
      type: object
      properties:
        id:
          type: string
          format: uuid
        email:
          type: string
          format: email
        fullName:
          type: string
        role:
          type: string
          enum: [USER, ADMIN, SUPERADMIN]
        isEmailVerified:
          type: boolean
      example:
        id: 59f95b9c-b705-4195-930b-f335ff97df02
        email: user@example.com
        fullName: John Doe
        role: USER
        isEmailVerified: false

    Error:
      type: object
      properties:
        code:
          type: integer
        message:
          type: string
      example:
        code: 400
        message: Bad Request
